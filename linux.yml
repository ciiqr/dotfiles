# list applications
# $ ls -la /usr/share/applications/
# query mime type of a file
# $ xdg-mime query filetype ~/Docs/dotfiles.txt
default.programs:
  default-web-browser: firefox.desktop
  # NOTE: should all be handled by the browser, but may not be on some desktop environments
  # http://: firefox.desktop
  # https://: firefox.desktop
  # text/html: firefox.desktop

  # TODO: evaluate current file managers
  # file://: spacefm.desktop
  # inode/directory: spacefm.desktop

  text/plain: sublime_text.desktop
  text/markdown: sublime_text.desktop
  text/x-csrc: sublime_text.desktop # .c .jsx
  text/x-lua: sublime_text.desktop
  text/csv: sublime_text.desktop
  text/javascript: sublime_text.desktop
  application/yaml: sublime_text.desktop
  application/json: sublime_text.desktop
  application/xml: sublime_text.desktop
  application/x-shellscript: sublime_text.desktop
  text/vnd.trolltech.linguist: sublime_text.desktop # .ts
  application/x-tiled-tsx: sublime_text.desktop # .tsx

  image/svg+xml: org.inkscape.Inkscape.desktop
  # TODO:
  # image/jpeg: gpicview.desktop
  # image/gif: gpicview.desktop
  # image/png: gpicview.desktop
  # image/svg+xml: gpicview.desktop
  # image/tiff: gpicview.desktop

  # TODO: other file types
